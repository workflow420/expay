<!DOCTYPE html>
<html lang="en">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>Admin - Global User Directory</title>
    <link href="https://fonts.googleapis.com/css2?family=Inter:wght@400;500;600;700;800&display=swap" rel="stylesheet">
    <link rel="stylesheet" href="https://cdnjs.cloudflare.com/ajax/libs/font-awesome/6.5.1/css/all.min.css" />
    <script src="https://cdn.tailwindcss.com"></script>
    <style> body { font-family: 'Inter', sans-serif; background-color: #f7f6fb; } </style>
</head>
<body class="p-8">

<div class="max-w-6xl mx-auto space-y-8">
    <div class="flex flex-col sm:flex-row justify-between items-start sm:items-center">
        <div>
            <a href="index.html" class="text-indigo-600 font-semibold inline-block mb-2 hover:text-indigo-800"><i class="fa-solid fa-arrow-left"></i> Back to Main Menu</a>
            <h1 class="text-3xl font-extrabold text-gray-800">Global User Directory</h1>
        </div>
        <button id="btn-refresh" class="mt-4 sm:mt-0 px-4 py-2 bg-white border border-gray-200 text-gray-700 font-bold rounded-lg shadow-sm hover:shadow transition">
            <i class="fa-solid fa-rotate-right mr-1"></i> Refresh List
        </button>
    </div>
    
    <div id="status-msg" class="hidden px-4 py-3 rounded-lg text-sm font-semibold"></div>

    <div class="bg-white rounded-2xl shadow-lg border border-gray-100 overflow-hidden">
        <div class="overflow-x-auto">
            <table class="w-full text-left border-collapse">
                <thead>
                    <tr class="bg-gray-50 text-gray-500 text-xs uppercase tracking-wider">
                        <th class="p-4 font-bold border-b border-gray-100">User Account</th>
                        <th class="p-4 font-bold border-b border-gray-100">Wallet Credit</th>
                        <th class="p-4 font-bold border-b border-gray-100">Commission</th>
                        <th class="p-4 font-bold border-b border-gray-100 text-right">Actions</th>
                    </tr>
                </thead>
                <tbody id="user-table-body" class="divide-y divide-gray-100 text-sm">
                    <tr>
                        <td colspan="4" class="p-8 text-center text-gray-400 font-bold">
                            <i class="fa-solid fa-spinner fa-spin text-2xl mb-2"></i><br>Fetching User Directory...
                        </td>
                    </tr>
                </tbody>
            </table>
        </div>
    </div>
</div>

<!-- Edit Balance Modal -->
<div id="edit-modal" class="hidden fixed inset-0 bg-black bg-opacity-50 flex items-center justify-center p-4 z-50">
    <div class="bg-white rounded-2xl shadow-2xl w-full max-w-md overflow-hidden transform transition-all">
        <div class="p-6 bg-indigo-600 text-white flex justify-between items-center">
            <h3 class="font-bold text-lg"><i class="fa-solid fa-user-pen mr-2"></i> Edit User Balances</h3>
            <button id="modal-close" class="text-white hover:text-gray-200"><i class="fa-solid fa-xmark text-xl"></i></button>
        </div>
        <div class="p-6 space-y-4">
            <p id="modal-user-label" class="text-xs text-center font-bold text-indigo-600 bg-indigo-50 py-2 rounded-lg"></p>
            
            <div>
                <label class="block text-xs font-bold text-gray-600 mb-1">Available Credit Balance</label>
                <div class="relative">
                    <span class="absolute left-3 top-2.5 text-gray-400"><i class="fa-solid fa-coins"></i></span>
                    <input id="edit-credit" type="number" class="w-full pl-9 pr-4 py-2 border border-gray-300 rounded-lg focus:ring-2 focus:ring-indigo-500 outline-none font-bold text-gray-800">
                </div>
            </div>
            
            <div>
                <label class="block text-xs font-bold text-gray-600 mb-1">Total Commission Balance</label>
                <div class="relative">
                    <span class="absolute left-3 top-2.5 text-gray-400"><i class="fa-solid fa-percent"></i></span>
                    <input id="edit-commission" type="number" step="any" class="w-full pl-9 pr-4 py-2 border border-gray-300 rounded-lg focus:ring-2 focus:ring-indigo-500 outline-none font-bold text-gray-800">
                </div>
            </div>

            <button id="btn-save-balances" class="w-full mt-4 py-3 bg-gradient-to-r from-indigo-500 to-indigo-600 text-white font-bold rounded-xl shadow-lg hover:opacity-90 transition">
                Save Securely
            </button>
        </div>
    </div>
</div>

<script type="module">
    import { initializeApp } from "https://www.gstatic.com/firebasejs/10.9.0/firebase-app.js";
    import { getFirestore, collection, getDocs, doc, updateDoc } from "https://www.gstatic.com/firebasejs/10.9.0/firebase-firestore.js";

    const firebaseConfig = {
        apiKey: "AIzaSyDvLYV-6qX8Gfq1u56WwERMWYj6VFPZgSk",
        authDomain: "ex-pay-jongli.firebaseapp.com",
        projectId: "ex-pay-jongli",
        storageBucket: "ex-pay-jongli.firebasestorage.app",
        messagingSenderId: "618037623216",
        appId: "1:618037623216:web:1d44f47c51864f8a2bbe75"
    };

    const app = initializeApp(firebaseConfig);
    const db = getFirestore(app);
    
    let allUsers = {};
    let editingUid = null;

    const showMsg = (msg, isError) => {
        const el = document.getElementById('status-msg');
        el.innerText = msg;
        el.className = `px-4 py-3 rounded-lg mb-6 text-sm font-semibold block ${isError ? 'bg-red-100 text-red-700' : 'bg-green-100 text-green-700'}`;
        setTimeout(() => el.classList.add('hidden'), 5000);
        window.scrollTo({top: 0, behavior: 'smooth'});
    };

    const fetchAllUsers = async () => {
        const tbody = document.getElementById('user-table-body');
        tbody.innerHTML = '<tr><td colspan="4" class="p-8 text-center text-gray-400 font-bold"><i class="fa-solid fa-spinner fa-spin text-2xl mb-2"></i><br>Refreshing...</td></tr>';
        
        try {
            const snapshot = await getDocs(collection(db, "users"));
            tbody.innerHTML = '';
            allUsers = {};
            
            if(snapshot.empty) {
                tbody.innerHTML = '<tr><td colspan="4" class="p-8 text-center text-red-400 font-bold">No registered users found.</td></tr>';
                return;
            }

            snapshot.forEach(docSnap => {
                const data = docSnap.data();
                const uid = docSnap.id;
                allUsers[uid] = data;
                
                const credit = (parseFloat(data.availableCredit) || 0).toFixed(2);
                const commission = (parseFloat(data.commission) || 0).toFixed(2);

                tbody.innerHTML += `
                    <tr class="hover:bg-gray-50 transition block sm:table-row">
                        <td class="p-4 block sm:table-cell">
                            <p class="font-bold text-gray-800">${data.accountName || 'Unnamed User'}</p>
                            <p class="text-[11px] text-gray-500">${data.email} | ID: ${uid.substring(0,6)}..</p>
                        </td>
                        <td class="p-4 block sm:table-cell">
                            <span class="inline-block px-2 py-1 bg-green-100 text-green-700 rounded-md font-mono font-bold text-xs">
                                ৳ ${credit}
                            </span>
                        </td>
                        <td class="p-4 block sm:table-cell">
                            <span class="inline-block px-2 py-1 bg-purple-100 text-purple-700 rounded-md font-mono font-bold text-xs">
                                ৳ ${commission}
                            </span>
                        </td>
                        <td class="p-4 text-left sm:text-right block sm:table-cell">
                            <button class="edit-user-btn px-4 py-2 bg-indigo-50 text-indigo-600 font-bold text-xs rounded shadow-sm hover:bg-indigo-100 transition whitespace-nowrap" data-uid="${uid}">
                                <i class="fa-solid fa-pen-to-square mr-1"></i> Edit Balance
                            </button>
                        </td>
                    </tr>
                `;
            });

            // Bind Edit Buttons
            document.querySelectorAll('.edit-user-btn').forEach(btn => {
                btn.addEventListener('click', (e) => {
                    const uid = e.currentTarget.getAttribute('data-uid');
                    openEditModal(uid);
                });
            });

        } catch(e) {
            tbody.innerHTML = `<tr><td colspan="4" class="p-8 text-center text-red-500 font-bold">Failed to load: ${e.message}</td></tr>`;
        }
    };

    const openEditModal = (uid) => {
        const data = allUsers[uid];
        if(!data) return;
        
        editingUid = uid;
        document.getElementById('modal-user-label').innerText = `${data.accountName} (${data.email})`;
        document.getElementById('edit-credit').value = parseFloat(data.availableCredit) || 0;
        document.getElementById('edit-commission').value = parseFloat(data.commission) || 0;
        
        document.getElementById('edit-modal').classList.remove('hidden');
    };

    const closeEditModal = () => {
        editingUid = null;
        document.getElementById('edit-modal').classList.add('hidden');
    };

    document.getElementById('modal-close').addEventListener('click', closeEditModal);

    document.getElementById('edit-modal').addEventListener('click', (e) => {
        if(e.target.id === 'edit-modal') closeEditModal();
    });

    document.getElementById('btn-save-balances').addEventListener('click', async () => {
        if(!editingUid) return;
        const btn = document.getElementById('btn-save-balances');
        const originalHtml = btn.innerHTML;
        btn.innerHTML = '<i class="fa-solid fa-spinner fa-spin"></i> Saving...';
        btn.disabled = true;

        const newCredit = parseFloat(document.getElementById('edit-credit').value) || 0;
        const newComm = parseFloat(document.getElementById('edit-commission').value) || 0;

        try {
            await updateDoc(doc(db, 'users', editingUid), {
                availableCredit: newCredit,
                commission: newComm
            });
            showMsg('User balances updated securely!', false);
            closeEditModal();
            fetchAllUsers();
        } catch(e) {
            alert("Error updating balances: " + e.message);
        }

        btn.innerHTML = originalHtml;
        btn.disabled = false;
    });

    document.getElementById('btn-refresh').addEventListener('click', fetchAllUsers);

    // Init
    fetchAllUsers();
</script>
</body>
</html>
